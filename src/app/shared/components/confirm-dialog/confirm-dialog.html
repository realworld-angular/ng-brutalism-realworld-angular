<nb-dialog>
  <nb-dialog-content>
    <h2 class="text-lg font-bold">{{ title() }}</h2>
    @if (message()) {
      <p class="mt-2 text-sm text-gray-600">{{ message() }}</p>
    }
  </nb-dialog-content>
  <nb-dialog-actions>
    <button nbButton variant="default" type="button" (click)="dismiss()" style="--nb-button-bg: transparent; --nb-button-border: transparent">
      {{ cancelLabel() }}
    </button>
    <button nbButton variant="danger" type="button" (click)="confirm()">
      {{ confirmLabel() }}
    </button>
  </nb-dialog-actions>
</nb-dialog>
