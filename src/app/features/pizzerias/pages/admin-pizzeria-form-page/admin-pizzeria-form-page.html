<div class="admin-page">
  <div class="container admin-form-wrap">
    <div class="admin-page__header">
      <h1 class="admin-page__title">New Pizzeria</h1>
    </div>

    <form [formRoot]="pizzeriaForm" class="admin-form">
      @if (pizzeriaForm().errors()[0]; as err) {
        <rw-callout variant="error" [message]="err.message!" />
      }
      <rw-photon-location-field [formField]="pizzeriaForm.location" />

      <rw-image-picker
        category="pizzeria"
        label="Pizzeria image"
        [formField]="pizzeriaForm.image"
      />

      <div class="form-actions">
        <button nbButton variant="neutral" type="submit" [disabled]="pizzeriaForm().submitting()">
          @if (pizzeriaForm().submitting()) {
            <span class="btn-spinner"></span>
            <span class="sr-only">Creating…</span>
          } @else {
            Create pizzeria
          }
        </button>
      </div>
    </form>
  </div>
</div>
